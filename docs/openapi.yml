openapi: 3.0.0
info:
  title: Rudex
  description: >
    Authentication service
  version: '0.1'
  x-displayName: Authentication service

servers:
  - url: http://localhost:4000
    description: Production

paths:
  /users/{username}/info:
    get:
      operationId: getUserInfo
      summary: Get current user info
      description: Returns the authenticated user's information.
      tags:
        - User info
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current authenticated user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '400':
          $ref: '#/components/responses/APIErrorResponse'
        '401':
          $ref: '#/components/responses/APIErrorResponse'
        '403':
          $ref: '#/components/responses/APIErrorResponse'
        '404':
          $ref: '#/components/responses/APIErrorResponse'
        '500':
          $ref: '#/components/responses/APIErrorResponse'

  /users/password:
    post:
      operationId: updatePassword
      summary: Update current user password
      description: Updates password for the authenticated user.
      tags:
        - User profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequestBody'
      responses:
        '204':
          description: Password updated successfully
        '400':
          $ref: '#/components/responses/APIErrorResponse'
        '401':
          $ref: '#/components/responses/APIErrorResponse'
        '404':
          $ref: '#/components/responses/APIErrorResponse'
        '500':
          $ref: '#/components/responses/APIErrorResponse'

  /login:
    post:
      operationId: loginUser
      summary: Login a user and return authentication tokens
      description: >
        Authenticates a user using email/username and password, returning
        a short-lived access token and a refresh token.
      tags:
        - User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestBody'
      responses:
        '200':
          description: Successful login (tokens set in httpOnly cookies)
          content:
            application/json:
              schema:
                type: object
                required:
                  - username
                properties:
                  username:
                    type: string
        '400':
          $ref: '#/components/responses/APIErrorResponse'
        '401':
          $ref: '#/components/responses/APIErrorResponse'
        '500':
          $ref: '#/components/responses/APIErrorResponse'

  /register:
    post:
      operationId: registerUser
      summary: Register a user
      description: >
        Create a new user with provided input.
      tags:
        - User registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequestBody'
      responses:
        '201':
          description: Registration created, confirmation email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/APIErrorResponse'
        '409':
          $ref: '#/components/responses/APIErrorResponse'
        '500':
          $ref: '#/components/responses/APIErrorResponse'

  /logout:
    post:
      operationId: logoutUser
      summary: Logout a user and clear authentication tokens.
      description: >
        Clears authentication cookies for the current browser session.
        This operation is idempotent and always succeeds even when the user is already logged out.
      tags:
        - User logout
      responses:
        '204':
          description: Logout successful
        '500':
          $ref: '#/components/responses/APIErrorResponse'

components:
  parameters:
    rudexUserIdQuery:
      name: rudexUserId
      in: query
      description: Unique ID of a Rudex user (optional)
      required: false
      schema:
        $ref: '#/components/schemas/rudexUserId'

  schemas:
    rudexUserId:
      type: string
      description: Rudex user identifier (string). Use UUID if you require a UUID format.
      example: '123e4567-e89b-12d3-a456-426614174000'

    LoginRequestBody:
      type: object
      additionalProperties: false
      required:
        - username
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        googleUserId:
          type: string

    RegisterRequestBody:
      type: object
      additionalProperties: false
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string

    UserInfoResponse:
      type: object
      additionalProperties: false
      required:
        - username
        - email
      properties:
        username:
          type: string
        email:
          type: string
          format: email

    UpdatePasswordRequestBody:
      type: object
      additionalProperties: false
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password

  responses:
    APIErrorResponse:
      description: API error response
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              type:
                type: string
              message:
                type: string
              stack:
                type: string
              info:
                type: object
