version: "3.8"

services:
  postgres_rudex_dev:
    image: postgres:16.2-alpine
    container_name: postgres_rudex_dev
    restart: always
    environment:
      POSTGRES_USER: rudex
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rudex_dev
    ports:
      - "4020:5432"
    volumes:
      - pgdata_rudex_dev:/var/lib/postgresql/data

  redis_rudex_dev:
    image: redis:7-alpine
    container_name: redis_rudex_dev
    restart: always
    ports:
      - "4030:6379"
    volumes:
      - redis_rudex_dev:/data

  mailhog_rudex_dev:
    image: mailhog/mailhog
    container_name: mailhog_rudex_dev
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata_rudex_dev:
  redis_rudex_dev:
