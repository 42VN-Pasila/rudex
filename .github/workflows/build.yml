name: Build

on:
  workflow_call:

permissions:
  contents: read

env:
  CI: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Generate types
        run: yarn gen
      - name: Run format check
        run: yarn format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Generate types
        run: yarn gen
      - name: Run lint
        run: yarn lint

  typescript-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Generate types
        run: yarn gen
      - name: Run Type Check
        run: yarn tsc --noEmit

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [format, lint, typescript-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Generate types
        run: yarn gen
      - name: Generate keys
        run: yarn gen:keys
      - name: Run unit tests
        run: yarn test
